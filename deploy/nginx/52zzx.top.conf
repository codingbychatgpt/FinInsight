limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_ai:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_sync:10m rate=2r/m;

server {
    listen 80;
    server_name 52zzx.top www.52zzx.top;
    server_tokens off;

    root /opt/fininsight/frontend/dist;
    index index.html;
    client_max_body_size 1m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location = /api/v1/sync {
        limit_req zone=api_sync burst=1 nodelay;
        auth_basic "FinInsight Admin";
        auth_basic_user_file /etc/nginx/fininsight.htpasswd;
        proxy_pass http://127.0.0.1:8000/api/v1/sync;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location ~ ^/api/v1/articles/[^/]+/(analyze|chat)$ {
        limit_req zone=api_ai burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /css/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location /js/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location /chunk/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location /static/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location = /runtime-config.js {
        try_files $uri =404;
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
